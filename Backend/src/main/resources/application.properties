spring.application.name=Finex AI

# Server
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/banking_ai
spring.datasource.username=postgres
#spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Disable Spring Boot auto-execution of schema.sql (Spring AI PgVectorStore handles its own schema)
spring.sql.init.mode=never

# Spring AI - Ollama
#spring.ai.ollama.base-url=http://localhost:11434
#spring.ai.ollama.chat.model=llama3.2
#spring.ai.ollama.embedding.model=nomic-embed-text
#spring.ai.ollama.chat.options.temperature=0.7

# Spring AI OpenAI Configuration for LOCAL EMBEDDING MODEL
spring.ai.openai.base-url=http://127.0.0.1:11434
spring.ai.openai.api-key=""
spring.ai.openai.embedding.options.model=nomic-embed-text-v2-moe
spring.ai.openai.embedding.options.dimensions=768

# Spring AI OpenAI Configuration for ONLINE CHAT MODEL (via OpenRouter)
spring.ai.openai.chat.base-url=https://openrouter.ai/api
spring.ai.openai.chat.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.chat.options.model=google/gemini-2.5-flash


# pgvector configuration
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.remove-existing-vector-store-table=false

# Document ingestion
app.ingestion.chunk-size=800
app.ingestion.chunk-overlap=200

# RAG configuration
app.rag.top-k-results=5
app.rag.similarity-threshold=0.7

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Clerk JWT Verification (OAuth2 Resource Server)
# Set CLERK_JWKS_URI=https://<your-clerk-frontend-api>/.well-known/jwks.json
# Find it in: Clerk Dashboard -> API Keys -> Clerk Frontend API
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${CLERK_JWKS_URI}

# Cloudflare R2 Storage
# Set via environment variables ? never hardcode these values
# CF_ACCOUNT_ID, CF_R2_ACCESS_KEY_ID, CF_R2_SECRET_ACCESS_KEY, CF_R2_BUCKET_NAME, CF_R2_PUBLIC_URL
cloudflare.r2.account-id=${CF_ACCOUNT_ID}
cloudflare.r2.access-key-id=${CF_R2_ACCESS_KEY_ID}
cloudflare.r2.secret-access-key=${CF_R2_SECRET_ACCESS_KEY}
cloudflare.r2.bucket-name=${CF_R2_BUCKET_NAME}
cloudflare.r2.public-url=${CF_R2_PUBLIC_URL}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.simple.metrics.export.enabled=true

# Logging
logging.level.com.phonethantzaw.aibankingassistant=INFO
logging.level.org.springframework.ai=DEBUG
