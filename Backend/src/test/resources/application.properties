spring.application.name=Finex AI Test

# Test configuration - Testcontainers will override datasource settings
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Ollama - for tests, you might want to mock this or use test doubles
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=llama3.2
spring.ai.ollama.embedding.model=nomic-embed-text

# pgvector
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.distance-type=COSINE
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.remove-existing-vector-store-table=true

# Document ingestion
app.ingestion.chunk-size=500
app.ingestion.chunk-overlap=100

# RAG configuration
app.rag.top-k-results=3
app.rag.similarity-threshold=0.5

# Logging
logging.level.com.phonethantzaw.aibankingassistant=DEBUG
